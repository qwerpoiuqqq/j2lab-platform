# =============================================================================
# J2LAB Platform - Nginx Reverse Proxy Configuration
# =============================================================================
# Architecture:
#   [Client] -> [Nginx :80/:443] -> [api-server :8000]
#                                 -> [frontend static files]
#   Internal workers (keyword-worker, campaign-worker) are NOT exposed
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    server_tokens off;  # Hide Nginx version in responses

    # --- Logging ---
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time';
    access_log /var/log/nginx/access.log main;

    # --- Performance ---
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50m;

    # --- Gzip Compression ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/x-javascript
        image/svg+xml;

    # --- Rate Limiting ---
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

    # --- Upstream Definitions ---
    upstream api_server {
        server api-server:8000;
    }

    # ==========================================================================
    # HTTP Server (redirect to HTTPS in production, or serve directly in dev)
    # ==========================================================================
    server {
        listen 80;
        server_name _;

        # --- Security Headers ---
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # --- Block internal API access from outside ---
        location /internal/ {
            deny all;
            return 403;
        }

        # --- API Proxy ---
        location /api/ {
            limit_req zone=api burst=50 nodelay;

            proxy_pass http://api_server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts for long-running requests
            proxy_connect_timeout 60s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }

        # --- Auth endpoints (stricter rate limit) ---
        location /api/v1/auth/ {
            limit_req zone=auth burst=10 nodelay;

            proxy_pass http://api_server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- Health Check (api-server) ---
        location /health {
            proxy_pass http://api_server;
            proxy_set_header Host $host;
        }

        # --- API Docs ---
        location /docs {
            proxy_pass http://api_server;
            proxy_set_header Host $host;
        }

        location /redoc {
            proxy_pass http://api_server;
            proxy_set_header Host $host;
        }

        location /openapi.json {
            proxy_pass http://api_server;
            proxy_set_header Host $host;
        }

        # --- Frontend Static Files (React SPA) ---
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;

            # Cache static assets aggressively
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }

            # Do not cache index.html
            location = /index.html {
                expires -1;
                add_header Cache-Control "no-store, no-cache, must-revalidate";
            }
        }

        # --- Deny dotfiles ---
        location ~ /\. {
            deny all;
            return 404;
        }
    }

    # ==========================================================================
    # HTTPS Server (uncomment when SSL certificates are available)
    # ==========================================================================
    # server {
    #     listen 443 ssl http2;
    #     server_name your-domain.com;
    #
    #     ssl_certificate /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers on;
    #     ssl_session_cache shared:SSL:10m;
    #     ssl_session_timeout 10m;
    #
    #     # HSTS
    #     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    #
    #     # (same location blocks as above)
    # }

    # ==========================================================================
    # HTTP -> HTTPS Redirect (uncomment when SSL is enabled)
    # ==========================================================================
    # server {
    #     listen 80;
    #     server_name your-domain.com;
    #     return 301 https://$server_name$request_uri;
    # }
}
